spring.application.name=api-gateway-ratelimiter


server.port=9090

spring.cloud.gateway.server.webflux.discovery.locator.enabled=false

spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000

rate-limiter.max-requests=10
rate-limiter.window-size-millis=10000
rate-limiter.algorithm=leaky-bucket
rate-limiter.api-server-url=http://localhost:8080


logging.level.com.example.ratelimiter=DEBUG


spring.jmx.enabled=false


